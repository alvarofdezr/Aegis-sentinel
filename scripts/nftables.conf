#!/usr/sbin/nft -f

# ==========================================
# Aegis Sentinel - Kernel Firewall Policy
# ==========================================

flush ruleset

table inet aegis_filter {
    chain forward {
        # Hook into the forwarding path
        type filter hook forward priority 0; policy accept;
        
        # Intercept traffic coming from the WireGuard tunnel (wg0)
        # Send it to Netfilter Queue #1 for Python (Aegis) inspection
        iifname "wg0" counter queue num 1 bypass
    }
}

table inet aegis_nat {
    chain postrouting {
        # Hook for Network Address Translation
        type nat hook postrouting priority 100; policy accept;
        
        # Masquerade outbound traffic to the internet
        # NOTE: Replace "eth0" with the actual internet-facing interface
        oifname "eth0" masquerade
    }
}